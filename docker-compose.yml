version: '3.8'

services:
  webapp:
    container_name: webapp  # <--- Das ist die wichtige Zeile!
    build: .
    expose:
      - "3000"
    environment:
      - MONGO_URL=mongodb://admin:${MONGO_PASS}@mongodb:27017/tasks?authSource=admin
      - MONGO_PASS=${MONGO_PASS}
    depends_on:
      - mongodb
    networks:
      - backend


  mongodb:
    image: mongo:4.4
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS}
    volumes:
      - mongo-data:/data/db
    networks:
      - backend

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - webapp
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  mongo-data:

